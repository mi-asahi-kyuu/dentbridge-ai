<VirtualHost *:80>
    ServerName dentbridge.mi-asahi.com

    RewriteEngine On
    RewriteRule ^ https://dentbridge.mi-asahi.com%{REQUEST_URI} [R=301,L,NE]

    ErrorLog logs/dentbridge.mi-asahi.com_error_log
    CustomLog logs/dentbridge.mi-asahi.com_access_log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName dentbridge.mi-asahi.com

    ProxyPreserveHost On
    ProxyTimeout 90
    AllowEncodedSlashes NoDecode

    # Remove spoofable client values. mod_proxy adds the actual peer address.
    RequestHeader unset X-Real-IP early
    RequestHeader unset X-Forwarded-For early
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass        / http://127.0.0.1:5678/ connectiontimeout=5 timeout=90 retry=0 nocanon
    ProxyPassReverse / http://127.0.0.1:5678/

    <Location "/api/translation/">
        LimitRequestBody 15728640
    </Location>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Permissions-Policy "microphone=(self), camera=(), geolocation=()"
    Header always set Strict-Transport-Security "max-age=31536000"

    ErrorLog logs/dentbridge.mi-asahi.com_error_log
    # Do not retain request paths for translation API calls.
    SetEnvIf Request_URI "^/api/translation/" dentbridge_sensitive_path
    CustomLog logs/dentbridge.mi-asahi.com_access_log combined env=!dentbridge_sensitive_path

    SSLCertificateFile /etc/letsencrypt/live/dentbridge.mi-asahi.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dentbridge.mi-asahi.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/dentbridge.mi-asahi.com/chain.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLProtocol -all +TLSv1.2
</VirtualHost>
</IfModule>
