<VirtualHost *:80>
    ServerName dentbridge.mi-asahi.com

    ProxyPreserveHost On
    ProxyTimeout 90
    RequestHeader unset X-Real-IP early
    RequestHeader unset X-Forwarded-For early
    RequestHeader set X-Forwarded-Proto "http"
    ProxyPass        / http://127.0.0.1:5678/ connectiontimeout=5 timeout=90 retry=0 nocanon
    ProxyPassReverse / http://127.0.0.1:5678/

    ErrorLog logs/dentbridge.mi-asahi.com_error_log
    SetEnvIf Request_URI "^/api/translation/" dentbridge_sensitive_path
    CustomLog logs/dentbridge.mi-asahi.com_access_log combined env=!dentbridge_sensitive_path
</VirtualHost>
